name: Deploy Web to server

on:
  push:
    branches: [main, master]
    paths:
      - 'apps/web/**'
      - '.github/workflows/deploy-web.yml'

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build web image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_URL="${{ secrets.NEXT_PUBLIC_API_URL }}" \
            -t trenuri-intarziere-web -f apps/web/Dockerfile .

      - name: Remove old web container
        run: docker rm -f trenuri-intarziere-web-container || true

      - name: Run web container
        run: |
          docker run -d \
            --name trenuri-intarziere-web-container \
            --network host \
            -e PORT=3003 \
            trenuri-intarziere-web
